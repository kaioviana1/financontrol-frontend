<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>FinanControl — Controle Financeiro Pessoal</title>
    <meta name="description" content="Gerencie suas finanças pessoais com facilidade. Controle receitas, despesas, categorias, metas e visualize relatórios detalhados." />
    <meta name="keywords" content="controle financeiro, finanças pessoais, orçamento, receitas, despesas, metas financeiras" />
    <meta name="author" content="FinanControl" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#80f96d" />
    <meta name="color-scheme" content="light dark" />
    <meta name="application-name" content="FinanControl" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="FinanControl — Controle Financeiro Pessoal" />
    <meta property="og:description" content="Gerencie suas finanças pessoais com facilidade." />
    <meta property="og:locale"      content="pt_BR" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Favicon -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon"             type="image/png"     href="/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon"                      href="/apple-touch-icon.png" />

    <!-- Fonts — preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
